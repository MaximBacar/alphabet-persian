<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persian Phonetic Transliterator</title>
  <meta name="description" content="Instantly transliterate Persian (Farsi) text into Latin phonetic script. Type any Persian word and see its pronunciation in English letters." />
  <meta name="keywords" content="Persian transliteration, Farsi phonetic, Persian to Latin, Farsi romanization, Persian pronunciation, فارسی" />
  <meta name="author" content="Maxim Bacar" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Persian Phonetic Transliterator" />
  <meta property="og:description" content="Instantly transliterate Persian (Farsi) text into Latin phonetic script." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Persian Phonetic Transliterator" />
  <meta name="twitter:description" content="Instantly transliterate Persian (Farsi) text into Latin phonetic script." />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #hero { overflow: hidden; transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.4s ease; max-height: 200px; opacity: 1; }
    #hero.hidden-hero { max-height: 0; opacity: 0; margin: 0;}

    #charRef { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.35s ease;}
    details[open] #charRef {grid-template-rows: 1fr;}
    #charRef > div {overflow: hidden;min-width: 0;width: 100%;}

    @keyframes flash {
      0%   { background-color: #fff1f2; }
      100% { background-color: white; }
    }
    .flash {
      animation: flash 0.4s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up {
      animation: fadeUp 0.5s ease both;
    }
    .fade-up:nth-child(1) { animation-delay: 0s; }
    .fade-up:nth-child(2) { animation-delay: 0.08s; }
    .fade-up:nth-child(3) { animation-delay: 0.16s; }
    .fade-up:nth-child(4) { animation-delay: 0.24s; }
    .fade-up:nth-child(5) { animation-delay: 0.32s; }

    details summary::marker { display: none; }
    details summary::-webkit-details-marker { display: none; }
    summary .arrow {
      transition: transform 0.3s ease;
      display: inline-block;
    }
    details[open] summary .arrow {
      transform: rotate(180deg);
    }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center justify-center p-6">
  <div class="w-full max-w-2xl space-y-6">
    <div id="hero" class="text-center fade-up">
      <h1 class="text-3xl font-bold tracking-tight text-gray-900">Persian → Phonetic</h1>
      <p class="text-gray-500 mt-1 text-sm">Type Persian text and see its Latin transliteration</p>
    </div>

    <div class="space-y-2 fade-up">
      <label class="text-xs uppercase tracking-widest text-gray-400 font-semibold">Phonetic Output</label>
      <input
        id="phoneticOutput"
        type="text"
        readonly
        placeholder="Phonetic output will appear here…"
        class="w-full bg-white border border-gray-200 rounded-xl px-4 py-1 text-lg text-pink-950 tracking-wide shadow-sm placeholder-gray-300 cursor-default focus:outline-none transition-shadow duration-200"
      />
    </div>

    <details id="charDetails" class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm fade-up">
      <summary class="px-4 py-3 cursor-pointer text-sm text-gray-500 hover:text-gray-800 transition-colors duration-200 select-none flex items-center justify-between">
        Character reference
        <span class="arrow text-gray-400">▾</span>
      </summary>
      <div id="charRef" class="text-sm">
        <div class="px-4 pb-4 pt-2 grid grid-cols-4 sm:grid-cols-6 gap-2 w-full"></div>
      </div>
    </details>

    <div class="space-y-2 fade-up">
      <label class="text-xs uppercase tracking-widest text-gray-400 font-semibold">Persian Input</label>
      <textarea
        id="persianInput"
        dir="rtl"
        placeholder="متن فارسی را اینجا بنویسید..."
        rows="4"
        class="w-full bg-white border border-gray-300 rounded-xl px-4 py-3 text-lg text-right leading-relaxed resize-none focus:outline-none focus:ring-2 focus:ring-pink-950 placeholder-gray-300 text-gray-900 shadow-sm transition"
      ></textarea>
    </div>

  </div>

  <script>
    const MAP = {
      'ا': 'a',  'آ': 'â',  'ب': 'b',  'پ': 'p',  'ت': 't',  'ث': 's',
      'ج': 'j',  'چ': 'ch', 'ح': 'h',  'خ': 'kh', 'د': 'd',  'ذ': 'z',
      'ر': 'r',  'ز': 'z',  'ژ': 'zh', 'س': 's',  'ش': 'sh', 'ص': 's',
      'ض': 'z',  'ط': 't',  'ظ': 'z',  'ع': "'",  'غ': 'gh', 'ف': 'f',
      'ق': 'q',  'ک': 'k',  'گ': 'g',  'ل': 'l',  'م': 'm',  'ن': 'n',
      'و': 'v/o/u',  'ه': 'h',  'ی': 'y',  'ئ': 'y',  'ء': "'",  'ؤ': 'v',
      'ة': 'h',  'ى': 'a',
      '\u064E': 'a',
      '\u0650': 'e',
      '\u064F': 'o',
      '\u064B': 'an',
      '\u064C': 'on',
      '\u064D': 'en',
      '\u0652': '',
      '\u0670': 'â',
      '\u200C': '-',
      '\u06c1': 'h'
    };

    const SHADDA = '\u0651';

    function transliterate(text) {
      let out = '';
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        if (ch === SHADDA) {
          const m = out.match(/[a-z']+$/);
          if (m) out += m[0];
          continue;
        }
        if (Object.prototype.hasOwnProperty.call(MAP, ch)) {
          out += MAP[ch];
        } else {
          out += ch;
        }
      }
      return out;
    }

    const input  = document.getElementById('persianInput');
    const output = document.getElementById('phoneticOutput');

    input.addEventListener('input', () => {
      output.value = input.value.trim() ? transliterate(input.value) : '';
      output.classList.remove('flash');
      void output.offsetWidth;
      output.classList.add('flash');
    });

    const hero = document.getElementById('hero');
    document.getElementById('charDetails').addEventListener('toggle', (e) => {
      hero.classList.toggle('hidden-hero', e.target.open);
    });

    const letters = [
      'ا','آ','ب','پ','ت','ث','ج','چ','ح','خ',
      'د','ذ','ر','ز','ژ','س','ش','ص','ض','ط',
      'ظ','ع','غ','ف','ق','ک','گ','ل','م','ن',
      'و','ہ','ی',
    ];
    const ref = document.querySelector('#charRef > div');
    letters.forEach(ch => {
      const cell = document.createElement('div');
      cell.className = 'flex items-center justify-between bg-gray-100 rounded-lg px-2 py-1';
      cell.innerHTML = `
        <span class="text-lg font-bold text-gray-800" dir="rtl">${ch}</span>
        <span class="text-pink-950 text-sm ml-2">${MAP[ch] || '?'}</span>
      `;
      ref.appendChild(cell);
    });
  </script>
</body>
</html>
